<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AtoC · Вход</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00c9a7">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#04080f;color:#dde4f0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 10% 15%,rgba(0,201,167,.08) 0%,transparent 50%),radial-gradient(ellipse at 90% 85%,rgba(255,184,48,.06) 0%,transparent 50%);pointer-events:none}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.012) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.012) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;opacity:.6}
.logo{text-align:center;margin-bottom:28px;position:relative;z-index:1}
.logo-b{background:linear-gradient(135deg,#ffb830,#f0a010);color:#04080f;font-weight:900;font-size:14px;padding:6px 14px;border-radius:9px;letter-spacing:.02em;display:inline-block;margin-bottom:6px}
.logo-t{color:rgba(255,255,255,.5);font-size:13px;font-weight:600}
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:28px;width:100%;max-width:400px;position:relative;z-index:1}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent)}
.tabs{display:flex;background:rgba(255,255,255,.05);border-radius:10px;padding:3px;margin-bottom:22px}
.tab-btn{flex:1;padding:9px;font-size:13px;font-weight:700;border:none;border-radius:8px;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .18s;background:none;color:rgba(221,228,240,.45)}
.tab-btn.on{background:rgba(0,201,167,.15);color:#4de8c8}
.field{margin-bottom:14px}
.field label{display:block;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(221,228,240,.3);margin-bottom:7px}
.field input{width:100%;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.09);border-radius:11px;padding:13px 15px;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;color:#fff;outline:none;transition:border-color .2s}
.field input::placeholder{color:rgba(255,255,255,.2)}
.field input:focus{border-color:rgba(0,201,167,.4)}
.btn-main{width:100%;background:linear-gradient(135deg,#00c9a7,#00a98f);color:#fff;border:none;border-radius:12px;padding:14px;font-size:14px;font-weight:800;font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;transition:all .2s;margin-bottom:12px}
.btn-main:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(0,201,167,.28)}
.btn-main:disabled{opacity:.5;cursor:not-allowed;transform:none}
.divider{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.div-line{flex:1;height:1px;background:rgba(255,255,255,.07)}
.div-text{font-size:10px;color:rgba(221,228,240,.25);font-weight:600;letter-spacing:.08em;text-transform:uppercase}
.btn-google{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(221,228,240,.8);border-radius:12px;padding:13px;font-size:13px;font-weight:700;font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;transition:all .2s}
.btn-google:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2)}
.btn-google svg{width:18px;height:18px;flex-shrink:0}
.err{color:#f87171;font-size:12px;margin-bottom:12px;text-align:center;display:none;font-weight:600}
.err.show{display:block}
.loading{display:none;text-align:center;padding:20px;color:rgba(221,228,240,.5);font-size:13px}
.loading.show{display:block}
</style>
</head>
<body>

<div class="logo">
  <div class="logo-b">AtoC</div>
  <div class="logo-t">IELTS from Zero</div>
</div>

<div class="card">
  <div class="tabs">
    <button class="tab-btn on" id="tab-login" onclick="switchTab('login')">Войти</button>
    <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Создать аккаунт</button>
  </div>

  <div class="err" id="err-msg"></div>

  <!-- LOGIN -->
  <div id="form-login">
    <div class="field">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="your@email.com"/>
    </div>
    <div class="field">
      <label>Пароль</label>
      <input type="password" id="login-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button class="btn-main" id="btn-login" onclick="doLogin()">Войти →</button>
    <div class="divider"><div class="div-line"></div><div class="div-text">или</div><div class="div-line"></div></div>
    <button class="btn-google" onclick="doGoogle()">
      <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Войти через Google
    </button>
  </div>

  <!-- REGISTER -->
  <div id="form-register" style="display:none">
    <div class="field">
      <label>Имя</label>
      <input type="text" id="reg-name" placeholder="Твоё имя"/>
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="reg-email" placeholder="your@email.com"/>
    </div>
    <div class="field">
      <label>Пароль</label>
      <input type="password" id="reg-pass" placeholder="Минимум 6 символов" onkeydown="if(event.key==='Enter')doRegister()"/>
    </div>
    <button class="btn-main" id="btn-register" onclick="doRegister()">Создать аккаунт →</button>
    <div class="divider"><div class="div-line"></div><div class="div-text">или</div><div class="div-line"></div></div>
    <button class="btn-google" onclick="doGoogle()">
      <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Зарегистрироваться через Google
    </button>
  </div>

  <div class="loading" id="loading">Входим...</div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase_core.js"></script>
<script>
function switchTab(t) {
  document.getElementById('form-login').style.display = t==='login'?'block':'none';
  document.getElementById('form-register').style.display = t==='register'?'block':'none';
  document.getElementById('tab-login').classList.toggle('on', t==='login');
  document.getElementById('tab-register').classList.toggle('on', t==='register');
  hideErr();
}

function showErr(msg) {
  const e = document.getElementById('err-msg');
  e.textContent = msg; e.classList.add('show');
}
function hideErr() { document.getElementById('err-msg').classList.remove('show'); }

function setLoading(on) {
  document.getElementById('loading').classList.toggle('show', on);
  document.querySelectorAll('.btn-main,.btn-google').forEach(b => b.disabled = on);
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  if (!email || !pass) { showErr('Заполни все поля'); return; }
  setLoading(true); hideErr();
  try {
    await ATOC.AUTH.loginEmail(email, pass);
    await afterLogin();
  } catch(e) {
    showErr(e.code === 'auth/wrong-password' ? 'Неверный пароль' :
            e.code === 'auth/user-not-found' ? 'Аккаунт не найден' :
            e.code === 'auth/invalid-email' ? 'Неверный email' : e.message);
    setLoading(false);
  }
}

async function doRegister() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pass = document.getElementById('reg-pass').value;
  if (!name || !email || !pass) { showErr('Заполни все поля'); return; }
  if (pass.length < 6) { showErr('Пароль минимум 6 символов'); return; }
  setLoading(true); hideErr();
  try {
    await ATOC.AUTH.register(email, pass, name);
    await afterLogin();
  } catch(e) {
    showErr(e.code === 'auth/email-already-in-use' ? 'Этот email уже используется' :
            e.code === 'auth/weak-password' ? 'Пароль слишком простой' : e.message);
    setLoading(false);
  }
}

async function doGoogle() {
  setLoading(true); hideErr();
  try {
    const result = await ATOC.AUTH.loginGoogle();
    // Создать профиль если новый пользователь
    const uid = result.user.uid;
    const doc = await ATOC.db.collection('users').doc(uid).get();
    if (!doc.exists) {
      await ATOC.db.collection('users').doc(uid).set({
        name: result.user.displayName,
        email: result.user.email,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        level: 'A0', xp: 0, streak: 0, lastActive: null,
        access: { a0: true, a1: true }
      });
    }
    await afterLogin();
  } catch(e) {
    if (e.code !== 'auth/popup-closed-by-user') showErr(e.message);
    setLoading(false);
  }
}

async function afterLogin() {
  // Проверяем доступ к A0
  const hasAccess = await ATOC.ACCESS.check('a0');
  if (hasAccess) {
    window.location.href = 'index.html';
  } else {
    window.location.href = 'payment_a0.html';
  }
}

// Если уже залогинен
ATOC.AUTH.onStateChange(async user => {
  if (user) await afterLogin();
});
</script>
</body>
</html>
